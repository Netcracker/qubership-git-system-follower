services:
  nexus:
    image: sonatype/nexus3:3.78.2
    container_name: nexus
    restart: always
    ports:
      - "17000:8081"   # Nexus itself
      - "17001:17001"  # docker registry anonymous
      - "17003:17003"  # docker registry auth required
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms1g -Xmx1g"

  nginx:
    image: nginx:1.27.4
    container_name: nginx-nexus
    restart: always
    depends_on:
      - nexus
    ports:
      - "17002:17002"  # docker registry https anonymous
      - "17004:17004"  # docker registry https auth
    volumes:
      - nginx-data:/etc/nginx
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/nexus/generate-certs.sh:/etc/nginx/ssl/generate-certs.sh
    entrypoint: [ "/bin/sh", "-c", "/etc/nginx/ssl/generate-certs.sh && exec nginx -g 'daemon off;'" ]

  localstack:
    image: localstack/localstack:2.1
    container_name: localstack
    restart: unless-stopped
    privileged: true
    environment:
      - SERVICES=ecr
      - DEFAULT_REGION=us-east-1
      - DOCKER_HOST=unix:///var/run/docker.sock
    ports:
      - "4566:4566"  # main LocalStack endpoint
      - "4510-4559:4510-4559" # optional, for edge ports
    volumes:
      - "./localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

networks:
  default:
    name: devbox-net

volumes:
  nexus-data:
  nginx-data: